# Despliega un commit concreto a Vercel (producción).
# Uso: Actions → Deploy commit → Run workflow → indicar el SHA (ej: 29f865fca55efc31ec31daa05796f0e682ece6dc).
# Requiere: secret VERCEL_TOKEN en el repo (y opcionalmente VERCEL_ORG_ID, VERCEL_PROJECT_ID si el proyecto no está enlazado).

name: Deploy commit to Vercel

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to deploy (full or short)'
        required: true
        default: '29f865fca55efc31ec31daa05796f0e682ece6dc'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout at commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout specific commit
        run: |
          git fetch origin
          git checkout "${{ github.event.inputs.commit_sha }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel deploy --prod --token "$VERCEL_TOKEN" --yes
        continue-on-error: true
